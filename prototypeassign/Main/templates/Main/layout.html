<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>{% block title %}{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="https://reneweconomy.com.au/wp-content/uploads/2018/02/act-government-logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    {% load static %} <!-- Instruct Django to load static files -->
    {% load bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}

</head>
<body>
    <div class="container-fluid p-3 bg-primary text-white">
        <img src="https://acs.bsss.act.edu.au/acs/Content/img/Transparent-BSSS-logo-white.png" alt="logo"/> <h2>ACS</h2>
    </div>

    <nav class="navbar navbar-expand-sm bg-secondary navbar-dark">
        <div class="container-fluid">
            <ul class="navbar-nav">
                {% block navbar %}
                
                {% endblock %}
            </ul>

        </div>

    </nav>
    {% block content %}
    {% endblock %}
</body>
</html>
